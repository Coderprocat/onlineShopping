<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>
<body>
    <header>
        <h1>Job Application Form</h1>
    <p>Please fill the job application form</p>
    </header>
    <main>
        <section>
            <h2> Personal Information</h2>
            <label>Name: </label>
            <input type="text" 
            id="fullname" 
            name="fullname"
            placeholder="Enter your full name"
            required>
            <br><br>

            <label>Email: </label>
            <input type="email"
             id="email" 
             name="email"
             placeholder="Enter your valid email"
             required> 
             <br><br>

            <label>Phone no:</label>
            <input type="number"
             id="phone" placeholder="eg: 0123456789"
             name="phone"
             required>
             <br><br>

            <label>Date of Birth: </label>
            <input type="date"
             id="dob" placeholder="mm-dd-yyyy"
             name="dob"
             required>
             <br><br>

            <label>Create Password: </label>
            <input type="password"
             id="password"
             name="password"
             placeholder="Create your password"
             required> 
            <br><br>

            <label>Portfolio website: </label>
            <input type="url"
             id="portfolio"
             name="portfolio"
             placeholder="https://xyz.com"
             required> 
            <br><br>

            <label>Upload Resume: </label>
            <input type="file"
             id="resume"
             name="resume"
             placeholder="Upload your Resume file(pdf)" 
             required> 
            <br><br>
        </section>

        <section>
        <h2> Gender</h2>
        Male<input type="radio" 
        id="male"
        name="gender"
        value="male"
        >
        Female<input type="radio" 
        id="female"
        name="gender"
        value="female"
        >
        Others<input type="radio" 
        id="others"
        name="gender"
        value="others"
        > 
        </section>

        <section>
            <h2> Technical Skills</h2>
            html/CSS<input type="checkbox"
            id="html"
            name="skills"
            value="html"
            >
            
            python<input type="checkbox"
            id="python"
            name="skills"
            value="python"
            >

            java<input type="checkbox"
            id="java"
            name="skills"
            value="java"
            >

            javascript<input type="checkbox"
            id="javascript"
            name="skills"
            value="javascript"
            >
        </section>

        <section>
            <h2> Postion Applying for</h2>
            
        <select id="postion"
        name="position">
            <option>Frontend developer</option>
            <option>Backend developer</option>
            <option>Intern</option>
        </select> 
        </section>

        <section>
            <h2>Prefered Job Location</h2>
        <select>
            <option> Goa</option>
            <option> banglore</option>
            <option> delhi</option>
            <option> haryana</option>
        </select>
        </section>

        <section>
            <h2>About yourself</h2>
            <textarea 
            name="about"
            rows="6"
            cols="40"
            placeholder="write about yourself">
            </textarea>
        </section>

        <button type="submit" 
        id="submit"
        name="submit"
        value="submit">Submit
    </button>

    <button type="reset" 
        id="reset"
        name="reset"
        value="reset">Reset
    </button>
    </main>
    <footer>
        <p>Thank you for submitting the form!</p>
    </footer>
</body>
</html>
